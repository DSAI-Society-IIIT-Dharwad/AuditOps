---
apiVersion: v1
kind: Namespace
metadata:
  name: attack-path-demo
---
apiVersion: v1
kind: Secret
metadata:
  name: production-db-credentials
  namespace: attack-path-demo
  labels:
    crown-jewel: "true"
    sensitivity: critical
type: Opaque
data:
  username: YWRtaW4=
  password: c3VwZXJzZWNyZXQ=
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: attack-path-demo
data:
  APP_MODE: production
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: webapp-sa
  namespace: attack-path-demo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secret-reader
  namespace: attack-path-demo
rules:
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["production-db-credentials"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: webapp-secret-reader-binding
  namespace: attack-path-demo
subjects:
- kind: ServiceAccount
  name: webapp-sa
  namespace: attack-path-demo
roleRef:
  kind: Role
  name: secret-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Pod
metadata:
  name: vulnerable-webapp-pod
  namespace: attack-path-demo
  labels:
    app: webapp
    public: "true"
  annotations:
    security.hack2future.io/source: "true"
    security.analysis/cve: "CVE-2024-1234"
    security.analysis/cvss: "8.1"
spec:
  serviceAccountName: webapp-sa
  containers:
  - name: webapp
    image: nginx:1.14.2
    ports:
    - containerPort: 80
    envFrom:
    - configMapRef:
        name: app-config
    - secretRef:
        name: production-db-credentials
