---
apiVersion: v1
kind: Namespace
metadata:
  name: attack-path-test
---
# 1. The Crown Jewel (Sink Node)
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: attack-path-test
  labels:
    app: production-db
    sensitivity: critical
type: Opaque
data:
  password: c3VwZXJzZWNyZXRwYXNzd29yZA== # "supersecretpassword"
---
# 2. The Subject (ServiceAccount)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: webapp-sa
  namespace: attack-path-test
---
# 3. The Permission (Role)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secret-reader
  namespace: attack-path-test
rules:
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["db-credentials"]
  verbs: ["get", "watch", "list"]
---
# 4. The Bridge (RoleBinding)
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: read-secrets-binding
  namespace: attack-path-test
subjects:
- kind: ServiceAccount
  name: webapp-sa
  namespace: attack-path-test
roleRef:
  kind: Role
  name: secret-reader
  apiGroup: rbac.authorization.k8s.io
---
# 5. The Public Entry Point (Source Node)
apiVersion: v1
kind: Pod
metadata:
  name: vulnerable-webapp-pod
  namespace: attack-path-test
  annotations:
    # Adding a mock annotation so your Python script can parse a risk score
    security.analysis/cve: "CVE-2024-1234"
    security.analysis/cvss: "8.1"
spec:
  serviceAccountName: webapp-sa
  containers:
  - name: webapp
    image: nginx:1.14.2 # An intentionally older, vulnerable image
    ports:
    - containerPort: 80