---
apiVersion: v1
kind: Namespace
metadata:
  name: secure-ns
---
apiVersion: v1
kind: Secret
metadata:
  name: prod-db-credentials
  namespace: secure-ns
  labels:
    crown-jewel: "true"
    sensitivity: critical
type: Opaque
data:
  password: c2VjdXJlLXBhc3N3b3Jk
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: webapp-sa
  namespace: secure-ns
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: config-reader
  namespace: secure-ns
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: config-reader-binding
  namespace: secure-ns
subjects:
- kind: ServiceAccount
  name: webapp-sa
  namespace: secure-ns
roleRef:
  kind: Role
  name: config-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: secure-ns
data:
  APP_MODE: "secure"
---
apiVersion: v1
kind: Pod
metadata:
  name: frontend-webapp-secure
  namespace: secure-ns
  labels:
    public: "true"
  annotations:
    security.hack2future.io/source: "true"
spec:
  serviceAccountName: webapp-sa
  automountServiceAccountToken: false
  containers:
  - name: webapp
    image: nginx:1.27.4
    envFrom:
    - configMapRef:
        name: app-config
